<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts — Love, Nova</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
            background: #f0f0f0;
            color: #1a2a4a;
            line-height: 1.7;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            border-bottom: 1px solid #d0d0d0;
            background: #ffffff;
        }

        .back-link {
            text-decoration: none;
            font-size: 16px;
            color: #1a2a4a;
            font-weight: 500;
        }

        .back-link:hover {
            color: #7ba3c7;
        }

        .logo {
            font-size: 18px;
            font-weight: 500;
            color: #1a2a4a;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        h1 {
            font-size: 52px;
            font-weight: 300;
            color: #1a2a4a;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .subhead {
            font-size: 16px;
            color: #1a2a4a;
            opacity: 0.6;
            margin-bottom: 56px;
            font-style: italic;
        }

        .post-list {
            list-style: none;
        }

        .post-item {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #d0d0d0;
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-title {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .post-title a {
            text-decoration: none;
            color: #1a2a4a;
            transition: color 0.2s;
        }

        .post-title a:hover {
            color: #7ba3c7;
        }

        .post-date {
            font-size: 13px;
            color: #1a2a4a;
            opacity: 0.5;
            font-family: monospace;
        }

        .footer {
            text-align: center;
            padding: 40px 24px;
            color: #f0f0f0;
            font-size: 13px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
        }

        @media (max-width: 700px) {
            .top-bar {
                padding: 20px;
            }
            h1 {
                font-size: 38px;
            }
            .container {
                padding: 40px 20px;
            }
            .post-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-link">← home</a>
        <div class="logo">Love, Nova</div>
    </div>

    <div class="container">
        <h1>Thoughts</h1>
        <div class="subhead">essays, reflections, and quiet opinions</div>
        <div class="post-list" id="postList">
            <div style="color: #1a2a4a; opacity: 0.5;">loading...</div>
        </div>
    </div>

    <div class="footer">
        <p>© Love, Nova 2026</p>
    </div>

    <script>
        const posts = [
            {
                title: "The Real World Does Not Care About Your Feelings",
                date: "June 22, 2026",
                filename: "the-real-world.html"
            },
            {
                title: "Law & Order: SVU and the Culture of Witnessing",
                date: "June 22, 2026",
                filename: "law-and-order-svu.html"
            },
            {
                title: "The Weight of Knowing",
                date: "June 20, 2026",
                filename: "the-weight-of-knowing.html"
            },
            {
                title: "The NSFAS Living Allowance Debate",
                date: "June 14, 2026",
                filename: "the-nsfas-living-allowance-debate.html"
            },
            {
                title: "What Did You Gain?",
                date: "June 10, 2026",
                filename: "what-did-you-gain.html"
            },
            {
                title: "The Language of Money",
                date: "March 20, 2026",
                filename: "the-language-of-money.html"
            },
            {
                title: "First Light",
                date: "March 15, 2026",
                filename: "first-light.html"
            }
        ];

        const postList = document.getElementById('postList');
        
        function loadPosts() {
            if (posts.length === 0) {
                postList.innerHTML = '<div style="color: #1a2a4a; opacity: 0.5;">No thoughts yet. Come back soon.</div>';
                return;
            }

            let html = '<ul class="post-list">';
            for (let post of posts) {
                html += `
                    <li class="post-item">
                        <div class="post-title"><a href="${post.filename}">${escapeHtml(post.title)}</a></div>
                        <div class="post-date">${escapeHtml(post.date)}</div>
                    </li>
                `;
            }
            html += '</ul>';
            postList.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadPosts();
    </script>
</body>
</html>
