<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry — Love, Nova</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
            background: #f0f0f0;
            color: #1a2a4a;
            line-height: 1.7;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            border-bottom: 1px solid #d0d0d0;
            background: #ffffff;
        }

        .back-link {
            text-decoration: none;
            font-size: 16px;
            color: #1a2a4a;
            font-weight: 500;
        }

        .back-link:hover {
            color: #7ba3c7;
        }

        .logo {
            font-size: 18px;
            font-weight: 500;
            color: #1a2a4a;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        h1 {
            font-size: 52px;
            font-weight: 300;
            color: #1a2a4a;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .subhead {
            font-size: 16px;
            color: #1a2a4a;
            opacity: 0.6;
            margin-bottom: 56px;
            font-style: italic;
        }

        .poem-list {
            list-style: none;
        }

        .poem-item {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #d0d0d0;
        }

        .poem-item:last-child {
            border-bottom: none;
        }

        .poem-title {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .poem-title a {
            text-decoration: none;
            color: #1a2a4a;
            transition: color 0.2s;
        }

        .poem-title a:hover {
            color: #7ba3c7;
        }

        .poem-date {
            font-size: 13px;
            color: #1a2a4a;
            opacity: 0.5;
            font-family: monospace;
        }

        .footer {
            text-align: center;
            padding: 40px 24px;
            color: #f0f0f0;
            font-size: 13px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
        }

        @media (max-width: 700px) {
            .top-bar {
                padding: 20px;
            }
            h1 {
                font-size: 38px;
            }
            .container {
                padding: 40px 20px;
            }
            .poem-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-link">← home</a>
        <div class="logo">Love, Nova</div>
    </div>

    <div class="container">
        <h1>Poetry</h1>
        <div class="subhead">verse, ballads, and things unsaid</div>
        <div class="poem-list" id="poemList">
            <div style="color: #1a2a4a; opacity: 0.5;">loading...</div>
        </div>
    </div>

    <div class="footer">
        <p>© Love, Nova 2026</p>
    </div>

    <script>
        const poems = [
            {
                title: "the earth was farming you",
                date: "June 27, 2026",
                filename: "the-earth-was-farming-you.html"
            },
            {
                title: "the shape of you",
                date: "June 24, 2026",
                filename: "the-shape-of-you.html"
            },
            {
                title: "the first time i was invisible",
                date: "June 21, 2026",
                filename: "the-first-time-i-was-invisible.html"
            },
            {
                title: "a quiet kind of rage",
                date: "June 18, 2026",
                filename: "a-quiet-kind-of-rage.html"
            },
            {
                title: "the weight of it",
                date: "June 15, 2026",
                filename: "the-weight-of-it.html"
            },
            {
                title: "what i did not say",
                date: "June 12, 2026",
                filename: "what-i-did-not-say.html"
            }
        ];

        const poemList = document.getElementById('poemList');
        
        function loadPoems() {
            if (poems.length === 0) {
                poemList.innerHTML = '<div style="color: #1a2a4a; opacity: 0.5;">No poems yet. Something is growing.</div>';
                return;
            }

            let html = '<ul class="poem-list">';
            for (let poem of poems) {
                html += `
                    <li class="poem-item">
                        <div class="poem-title"><a href="${poem.filename}">${escapeHtml(poem.title)}</a></div>
                        <div class="poem-date">${escapeHtml(poem.date)}</div>
                    </li>
                `;
            }
            html += '</ul>';
            poemList.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadPoems();
    </script>
</body>
</html>
