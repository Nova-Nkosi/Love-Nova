<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love, Nova</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
            background: #f0f0f0;
            color: #1a2a4a;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            padding: 24px 32px;
            display: flex;
            justify-content: flex-end;
            position: relative;
            background: #1a1a1a;
        }

        .hamburger {
            cursor: pointer;
            width: 32px;
            height: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 100;
        }

        .hamburger span {
            width: 100%;
            height: 2px;
            background: #f0f0f0;
            transition: all 0.3s;
        }

        .menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            box-shadow: -5px 0 30px rgba(0,0,0,0.3);
            padding: 80px 32px;
            transition: right 0.3s ease;
            z-index: 99;
        }

        .menu.active {
            right: 0;
        }

        .menu a {
            display: block;
            text-decoration: none;
            font-size: 18px;
            color: #f0f0f0;
            margin-bottom: 28px;
            font-weight: 400;
            transition: color 0.2s;
            letter-spacing: 0.5px;
        }

        .menu a:hover {
            color: #7ba3c7;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 98;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 24px;
            background: #f0f0f0;
        }

        .header {
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 72px;
            font-weight: 300;
            letter-spacing: -2px;
            color: #1a2a4a;
            margin-bottom: 16px;
        }

        .header p {
            font-size: 18px;
            color: #1a2a4a;
            opacity: 0.6;
            font-style: italic;
            letter-spacing: 1px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            background: transparent;
            border: 2px solid #1a2a4a;
            padding: 16px 56px;
            font-size: 16px;
            font-weight: 500;
            color: #1a2a4a;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #1a2a4a;
            color: #f0f0f0;
        }

        .btn-secondary {
            border-color: #7ba3c7;
            color: #7ba3c7;
        }

        .btn-secondary:hover {
            background: #7ba3c7;
            color: #1a1a1a;
        }

        .footer {
            text-align: center;
            padding: 40px 24px;
            color: #f0f0f0;
            font-size: 13px;
            letter-spacing: 0.5px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
        }

        @media (max-width: 700px) {
            .header h1 {
                font-size: 48px;
            }
            .btn {
                padding: 14px 40px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="menu" id="menu">
        <a href="who-is-nova.html">Who is Nova?</a>
        <a href="about.html">About</a>
        <a href="poetry.html">Poetry</a>
        <a href="thoughts.html">Thoughts</a>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div class="header">
            <h1>Love, Nova</h1>
            <p>words from a quiet mind</p>
        </div>
        <div class="button-group">
            <a href="thoughts.html" class="btn">Thoughts</a>
            <a href="poetry.html" class="btn btn-secondary">Poetry</a>
        </div>
    </div>

    <div class="footer">
        <p>© Love, Nova 2026</p>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        hamburger.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
